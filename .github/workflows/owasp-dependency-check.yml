name: OWASP Dependency Check

on:
  push:
    branches: [ main ]        
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  security-events: write

jobs:
  dependency-check:
    name: Scan dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache Dependency-Check data
        uses: actions/cache@v4
        with:
          path: ~/.dependency-check
          key: dependency-check-${{ runner.os }}-${{ hashFiles('package-lock.json', 'Cargo.lock') }}
          restore-keys: |
            dependency-check-${{ runner.os }}-

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        with:
          project: "cas-typescript-sdk"
          path: "."
          format: "HTML"
          out: "dependency-check-report"
          args: >
            --format JSON
            --format SARIF
            --enableRetired

      - name: Upload OWASP dependency report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: dependency-check-report
          retention-days: 7

      - name: Upload SARIF to code scanning
        if: success() && hashFiles('dependency-check-report/*.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: dependency-check-report/dependency-check-report.sarif
